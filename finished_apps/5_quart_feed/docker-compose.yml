services:
  web:
    build: .
    container_name: app_web_1
    ports:
      - "5000:5000"
    volumes:
      - ./:/quartfeed_app
    depends_on:
      - db
    stdin_open: true
    tty: true
    environment:
      QUART_APP: manage.py
      QUART_ENV: development
      PORT: 5000
      SECRET_KEY: "you-will-never-guess"
      DEBUG: 1
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
      DB_HOST: db
      DATABASE_NAME: app
      UPLOADS_FOLDER: /quartfeed_app/static/uploads
      IMAGES_FOLDER: /quartfeed_app/static/uploads
      IMAGE_URL: /static/uploads
      WTF_CSRF_ENABLED: "1"
  db:
    image: postgres:16-alpine
    restart: always
    container_name: app_db_1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app
